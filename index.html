<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="google" content="notranslate" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://fenando-rv.github.io/" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Selamat Hari Raya Idul Fitri 1447H</title>
    <meta name="description" content="Taqabbalallahu Minna Wa Minkum. Mohon maaf lahir dan batin atas segala khilaf dan salah." />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <style>
        .gold-gradient-text {
            background: linear-gradient(to right, #fde047, #ca8a04, #fde047);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glass-card {
            background: rgba(6, 78, 59, 0.2);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(253, 224, 71, 0.2);
            border-radius: 1.5rem;
        }
        .abstract-shape {
            background: radial-gradient(circle, rgba(16, 185, 129, 0.2) 0%, transparent 70%);
            position: absolute;
        }
    </style>
</head>

<body class="text-white h-[100dvh] w-full flex justify-center items-center relative overflow-hidden bg-[#010a08]">
    
    <audio id="takbiran_sound" preload="auto" loop>
        <source src="resources/mp3/takbiran.mp3" type="audio/mpeg">
    </audio>

    <div class="fixed inset-0 z-0 flex items-center justify-center pointer-events-none">
        <div class="abstract-shape w-[150vw] h-[150vw] sm:w-[80vw] sm:h-[80vw] opacity-30 rotate-45"></div>
        <canvas id="particles" class="absolute inset-0 w-full h-full"></canvas>
    </div>

    <div id="cover" class="absolute inset-0 flex flex-col items-center justify-center p-6 z-50 bg-[#010a08] transition-all duration-1000">
        <div class="text-center mb-16">
            <h2 class="text-sm font-light mb-2 text-emerald-400 tracking-[0.4em] uppercase">Selamat Hari Raya</h2>
            <h1 class="text-4xl sm:text-5xl font-bold mb-2 tracking-widest gold-gradient-text uppercase">Idul Fitri</h1>
            <h3 class="text-xl font-light text-emerald-200/80 tracking-[0.5em]">1447 H</h3>
        </div>

        <div id="openBtn" class="cursor-pointer group flex flex-col items-center">
            <div class="relative w-32 h-32 sm:w-40 sm:h-40 mb-10 drop-shadow-[0_0_20px_rgba(253,224,71,0.2)] group-hover:scale-110 transition-transform">
                <svg viewBox="0 0 100 100" class="w-full h-full animate-pulse">
                    <rect x="20" y="20" width="60" height="60" transform="rotate(45 50 50)" fill="#064e3b" stroke="#fde047" stroke-width="2.5" />
                    <path d="M50 8 L50 92 M8 50 L92 50" stroke="#fde047" stroke-width="1.5" opacity="0.8" />
                    <circle cx="50" cy="50" r="6" fill="#fde047" />
                </svg>
            </div>

            <div class="px-8 py-3 rounded-full border border-yellow-500/40 bg-emerald-950/60 backdrop-blur-md hover:bg-emerald-900 transition-all">
                <span class="text-yellow-300 text-sm tracking-widest uppercase font-semibold">Buka Pesan</span>
            </div>
        </div>
    </div>

    <div id="content-wrapper" class="absolute inset-0 flex items-center justify-center p-4 sm:p-8 z-20 w-full max-w-lg mx-auto opacity-0 pointer-events-none transition-opacity duration-1000">
        <div class="glass-card w-full p-8 sm:p-10 flex flex-col relative overflow-hidden">
            <div class="flex-1 flex flex-col items-center justify-center space-y-8 z-10 text-center">
                <div>
                    <p class="text-[10px] text-emerald-400 mb-1 uppercase tracking-widest text-left">Kepada:</p>
                    <h3 class="text-xl sm:text-2xl font-bold gold-gradient-text">Keluarga & Sahabat</h3>
                </div>

                <div class="text-4xl sm:text-5xl text-yellow-400 py-6" style="font-family: 'Amiri', serif;">
                    تَقَبَّلَ اللَّهُ مِنَّا وَمِنْكُمْ
                </div>

                <div class="border-l-2 border-yellow-500/30 pl-4 text-left">
                    <h2 class="text-lg font-bold text-emerald-50">Selamat Idul Fitri 1447H</h2>
                    <p class="text-sm text-emerald-100/70 leading-relaxed font-light mt-2">
                        Dalam beningnya hati ada keruh prasangka, dalam santunnya sapa ada cela kata. 
                        Mohon maaf lahir dan batin atas segala khilaf.
                    </p>
                </div>

                <div class="w-full text-right mt-4">
                    <p class="text-[10px] text-emerald-400 uppercase">Salam Hangat,</p>
                    <h3 class="text-xl font-bold text-emerald-50">Fenando RV</h3>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const openBtn = document.getElementById('openBtn');
            const cover = document.getElementById('cover');
            const content = document.getElementById('content-wrapper');
            const audio = document.getElementById('takbiran_sound');

            openBtn.addEventListener('click', () => {
                // 1. Play Music
                audio.play().catch(err => console.log("Autoplay blocked: ", err));

                // 2. Hide Cover
                cover.style.opacity = '0';
                cover.style.pointerEvents = 'none';

                // 3. Show Content
                setTimeout(() => {
                    cover.style.display = 'none';
                    content.classList.remove('opacity-0', 'pointer-events-none');
                    content.style.opacity = '1';
                }, 1000);
            });
        });
    </script>

</body>
</html>
